# Persistent vector DB for the mem0 lesson memory (same Qdrant the sibling
# `agentcore` repo uses).
#
#   docker compose up -d        # Qdrant on localhost:6333
#
# Data lives in the named volume `qdrant_data`, so it survives restarts/recreates.
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentcore-qdrant
    ports:
      - "6333:6333"   # REST/gRPC (matches QDRANT_HOST/QDRANT_PORT in agentmem.config)
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_data:
