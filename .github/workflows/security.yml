name: Security

on:
  pull_request:        # any target branch

permissions:
  contents: read

# Actions pinned to commit SHA (supply-chain hardening); trailing comment = tag.
jobs:
  # 1. Block PRs that introduce dependencies with known vulnerabilities or denied licenses.
  #    Uses the GitHub dependency graph (diffs base vs head). Public repos work out of the
  #    box; private repos need GitHub Advanced Security.
  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          # Tighten/relax as policy requires, e.g.:
          # deny-licenses: GPL-3.0, AGPL-3.0

  # 2. Secret scanning across the full git history. Complements GitHub's native
  #    Secret Scanning + Push Protection (enable those in repo Settings → see
  #    .github/BRANCH_PROTECTION.md).
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0   # full history so historical leaks are caught too
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for GitHub Organizations; personal/public
          # repos run for free without it.

  # 3. CVE gate on the resolved Python dependency tree. The CI runner is a clean env, so
  #    `pip install -e .` resolves exactly agentmem's deps (no local version pollution),
  #    and pip-audit then fails the PR on any advisory. This complements Dependabot
  #    (alerts) with a hard merge block.
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install the project (full dependency tree)
        run: pip install -e .
      - run: pip install pip-audit
      - name: Audit installed dependencies
        # If a transitive advisory has no fix yet, triage it by appending its id:
        #   pip-audit --ignore-vuln GHSA-xxxx-xxxx-xxxx
        run: pip-audit

  # 4. CVE gate on the JavaScript toolchain (the ESLint devDependency tree). Fails only on
  #    high/critical so low-severity dev-only noise does not block PRs.
  npm-audit:
    name: npm-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
