name: CI

on:
  pull_request:        # any target branch

permissions:
  contents: read

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The unit tests are offline: they import only agentmem.{guardrails,lesson,config,
      # ports,rules_store,atomicio}, which need just pydantic. mem0 / qdrant-client /
      # sentence-transformers (torch) are imported lazily inside build_store, so we skip
      # that heavy tree to keep the PR gate fast. pytest adds src/ to the path itself
      # (pythonpath in pyproject), so the package needs no install.
      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pydantic
      - name: Run tests
        run: pytest -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - name: Lint (ruff check)
        run: ruff check .

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # pydantic ships its own type information, so installing it lets mypy check the
      # BaseModel-derived entities (Lesson, GuardrailDecision, CustomRule) properly.
      - run: pip install mypy pydantic
      - name: Type-check src/agentmem
        run: mypy

  eslint:
    name: eslint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      # Lints the dashboard SPA (flat config in eslint.config.js). `npm ci` installs from
      # the committed package-lock.json for a reproducible toolchain; eslint's parser also
      # catches syntax errors, so this fully supersedes the old `node --check`.
      - run: npm ci
      - run: npm run lint:js
