name: CI

on:
  pull_request:        # any target branch

permissions:
  contents: read

# Actions are pinned to a commit SHA (supply-chain hardening); the trailing comment is the
# human-readable tag. Bump both together (Dependabot's github-actions updates do this).
jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      # The unit tests are offline: they import only agentmem.{guardrails,lesson,config,
      # ports,rules_store,atomicio} + the dashboard helpers, which need just pydantic.
      # mem0 / qdrant-client / sentence-transformers (torch) are imported lazily, so we
      # skip that heavy tree to keep the PR gate fast. pytest adds src/ and dashboard/ to
      # the path itself (pythonpath in pyproject), so the package needs no install.
      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pytest-cov pydantic
      # Coverage threshold (fail_under) lives in [tool.coverage.report] in pyproject.toml,
      # so it is enforced identically here and locally.
      - name: Run tests with coverage gate
        run: pytest -q --cov --cov-report=term-missing

  build:
    name: build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      # Building the wheel/sdist only needs the build backend (setuptools), not the heavy
      # runtime deps; twine check validates the package metadata renders correctly.
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - name: Lint (ruff check)
        run: ruff check .

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      # pydantic ships its own type information, so installing it lets mypy check the
      # BaseModel-derived entities (Lesson, GuardrailDecision, CustomRule) properly.
      - run: pip install mypy pydantic
      - name: Type-check src/agentmem
        run: mypy

  eslint:
    name: eslint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
      # Lints the dashboard SPA (flat config in eslint.config.js). `npm ci` installs from
      # the committed package-lock.json for a reproducible toolchain; eslint's parser also
      # catches syntax errors, so this fully supersedes the old `node --check`.
      - run: npm ci
      - run: npm run lint:js
