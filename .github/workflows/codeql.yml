name: CodeQL

on:
  pull_request:        # any target branch
  schedule:
    # Weekly scan catches newly-disclosed vulnerability patterns even with no PR activity.
    - cron: '27 4 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # python = the agentmem package + dashboard backend + hooks; javascript = the SPA.
        language: [python, javascript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          language: ${{ matrix.language }}
          queries: security-and-quality
      # No compilation step: both languages are interpreted, so autobuild is unnecessary.
      - uses: github/codeql-action/analyze@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          category: "/language:${{ matrix.language }}"
